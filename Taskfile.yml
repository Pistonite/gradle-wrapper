version: '3'

includes:
  common:
    taskfile: ./mono-dev/task/common.yaml
    optional: true
    flatten: true

  cli: { taskfile: packages/wrapper-cli,  dir: packages/wrapper-cli,  internal: true }
  e2e: { taskfile: packages/e2e-test,     dir: packages/e2e-test,     internal: true }

tasks:
  install:
    - rm -rf mono-dev
    - git clone https://github.com/Pistonight/mono-dev --depth 1

  check:
    - task: cli:check
    - task: e2e:check

  test:
    - cargo test
    - cargo run -p e2e-test -- --clean
    - cargo run -p e2e-test

  e2e:
    - cargo run -p e2e-test -- {{.CLI_ARGS}}


  publish:
    vars:
      VERSION:
        sh: grep -E '^version =' packages/wrapper-cli/Cargo.toml | head -n1 | sed -E 's/version = "([^"]+)"/\1/'
    cmds:
      - git tag v{{.VERSION}}
      - git push origin v{{.VERSION}}

  clean:
    - cargo clean
    - rm -rf .jabba .gradle-wrapper .gradle-test-home mono-dev
